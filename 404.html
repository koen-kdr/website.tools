<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Pagina niet gevonden</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link id="favicon" rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📍</text></svg>">

    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent-primary: #10b981; /* Emerald */
            --accent-secondary: #3b82f6; /* Blue */
            --accent-tertiary: #06b6d4; /* Cyan */
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 120vh; /* Maakt scrollen mogelijk */
            padding: 2rem 1.5rem;
            perspective: 1000px;
        }

        /* Dynamische Mesh Achtergrond */
        .mesh-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                radial-gradient(at 50% 50%, rgba(6, 182, 212, 0.05) 0px, transparent 50%);
            animation: mesh-move 25s infinite alternate ease-in-out;
        }

        @keyframes mesh-move {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* Glassmorphism Kaart */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 480px;
            padding: 4rem 2.5rem;
            border-radius: 3.5rem;
            text-align: center;
            position: relative;
            margin-top: 10vh;
            transition: transform 0.2s ease-out;
        }

        /* Geanimeerde tekst verloop */
        .gradient-text {
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Pulseffect voor icoon */
        .icon-pulse {
            position: absolute;
            inset: -10px;
            border-radius: 2rem;
            background: var(--accent-primary);
            opacity: 0.15;
            animation: ripple 3s infinite;
            z-index: -1;
        }

        @keyframes ripple {
            0% { transform: scale(0.9); opacity: 0.2; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* Knoppen */
        .btn-action {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-action:hover {
            transform: translateY(-4px) scale(1.02);
            filter: brightness(1.1);
            box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.4);
        }
    </style>
</head>
<body>

    <div class="mesh-gradient" id="bg-mesh"></div>

    <div id="main-card" class="glass-card">
        <!-- Icoon sectie -->
        <div class="relative w-24 h-24 mx-auto mb-10">
            <div class="icon-pulse"></div>
            <div class="relative z-10 w-full h-full bg-slate-900/90 border border-white/10 rounded-[2rem] flex items-center justify-center shadow-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 4a2 2 0 114 0v1a2 2 0 01-2 2H3a2 2 0 01-2-2V4a2 2 0 114 0v1a2 2 0 002 2h1a2 2 0 002-2V4z" opacity="0.3" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>

        <!-- Tekst sectie -->
        <div class="space-y-3 mb-12">
            <p class="text-[11px] font-black uppercase tracking-[0.5em] text-emerald-500/80">Foutcode 404</p>
            <h1 class="gradient-text text-5xl font-black tracking-tighter">Spoorloos.</h1>
            <p class="text-slate-400 font-medium leading-relaxed px-4">
                De pagina die je zoekt is buiten ons bereik geraakt. Laten we je terugbrengen naar de bewoonde wereld.
            </p>
        </div>

        <!-- Acties -->
        <div class="space-y-6">
            <a href="/" class="btn-action group block w-full p-0.5 rounded-2xl shadow-xl">
                <div class="bg-slate-900/40 py-4 rounded-[14px] backdrop-blur-sm border-t border-white/10">
                    <span class="block text-white font-black text-lg tracking-tight uppercase">Terug naar Home</span>
                </div>
            </a>
            
            <div class="flex items-center justify-center space-x-3 opacity-50">
                <div class="h-px w-8 bg-slate-700"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Of probeer later opnieuw</span>
                <div class="h-px w-8 bg-slate-700"></div>
            </div>
        </div>

        <!-- Status Indicator -->
        <div class="mt-12 pt-8 border-t border-white/5">
            <div class="flex items-center justify-center space-x-3">
                <div class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </div>
                <span class="text-[10px] font-extrabold text-slate-500 uppercase tracking-[0.2em]">Systeem Online</span>
            </div>
        </div>
    </div>

    <!-- Extra content om scrollen te demonstreren/vullen -->
    <div class="mt-20 text-center opacity-20 pointer-events-none pb-20">
        <p class="text-sm font-medium">Zoekgeraakt in de digitale kosmos</p>
    </div>

    <script>
        const card = document.getElementById('main-card');
        const mesh = document.getElementById('bg-mesh');

        // Muis-volg effect voor de kaart
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            const y = (window.innerHeight / 2 - e.pageY) / 45;
            
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
            mesh.style.transform = `scale(1.1) translate(${x * 2}px, ${y * 2}px)`;
        });

        // Touch support
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            const x = (window.innerWidth / 2 - touch.pageX) / 30;
            const y = (window.innerHeight / 2 - touch.pageY) / 30;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
